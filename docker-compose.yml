version: '3.9'

# ════════════════════════════════════════════════════════════════════
# Repo2APK - Docker Compose Configuration
# ════════════════════════════════════════════════════════════════════

services:
  # ─── Application Server ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repo2apk-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      API_KEY_SECRET: ${API_KEY_SECRET:?API_KEY_SECRET is required}
      BUILD_TIMEOUT_MS: ${BUILD_TIMEOUT_MS:-900000}
      MAX_REPO_SIZE_MB: ${MAX_REPO_SIZE_MB:-500}
      ANDROID_HOME: /opt/android-sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      FLUTTER_HOME: /opt/flutter
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      # Persistent build artifacts
      - builds_data:/app/builds
      # Persistent logs
      - logs_data:/app/logs
      # Gradle cache (speeds up builds significantly)
      - gradle_cache:/home/appuser/.gradle
      # npm cache
      - npm_cache:/home/appuser/.npm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # Resource limits for builds
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    networks:
      - repo2apk-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─── NGINX Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: repo2apk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      # SSL certificates (add your certs here for production)
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      # APK downloads served directly by nginx
      - builds_data:/var/www/builds:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - repo2apk-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ─── Named Volumes ───────────────────────────────────────────────────
volumes:
  builds_data:
    driver: local
  logs_data:
    driver: local
  gradle_cache:
    driver: local
  npm_cache:
    driver: local

# ─── Networks ────────────────────────────────────────────────────────
networks:
  repo2apk-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
