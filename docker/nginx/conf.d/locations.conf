# ─── Security Headers ────────────────────────────────────────────────────────
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "no-referrer-when-downgrade" always;

# ─── WebSocket (Socket.io) ────────────────────────────────────────────────────
location /socket.io/ {
    proxy_pass http://repo2apk_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

# ─── Build API (rate limited) ─────────────────────────────────────────────────
location /api/build {
    limit_req zone=build burst=5 nodelay;
    limit_req_status 429;

    proxy_pass http://repo2apk_app;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 900s;   # 15 min for long builds
    proxy_send_timeout 900s;
    proxy_buffering off;
}

# ─── APK Downloads ────────────────────────────────────────────────────────────
location /api/build/download/ {
    # No rate limit on downloads
    proxy_pass http://repo2apk_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    proxy_read_timeout 120s;

    # APK download headers
    add_header Content-Disposition "attachment" always;
}

# ─── General API ─────────────────────────────────────────────────────────────
location /api/ {
    limit_req zone=api burst=20 nodelay;

    proxy_pass http://repo2apk_app;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
}

# ─── Frontend Static Files ────────────────────────────────────────────────────
location / {
    proxy_pass http://repo2apk_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://repo2apk_app;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
