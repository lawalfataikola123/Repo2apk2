# ════════════════════════════════════════════════════════════════════
# Repo2APK - NGINX Site Configuration
# Supports HTTP (dev) and HTTPS (production)
# ════════════════════════════════════════════════════════════════════

# Upstream application server
upstream repo2apk_app {
    server app:5000;
    keepalive 32;
}

# ─── HTTP Server (redirects to HTTPS in production) ──────────────
server {
    listen 80;
    server_name _;

    # For Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Comment out the redirect below for HTTP-only development
    # return 301 https://$host$request_uri;

    # Include main location blocks for HTTP-only mode
    include /etc/nginx/conf.d/locations.conf;
}

