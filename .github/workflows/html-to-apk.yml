name: HTML to APK
on:
  workflow_dispatch:
    inputs:
      html_url:
        description: 'Raw URL of HTML file'
        required: true
      app_name:
        description: 'App Name'
        required: true
        default: 'My App'
      package_name:
        description: 'Package Name'
        required: true
        default: 'com.repo2apk.app'
      icon_url:
        description: 'Custom app icon URL'
        required: false
        default: ''
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O /tmp/cmd.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q /tmp/cmd.zip -d /tmp/cmd
          mv /tmp/cmd/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH
      - name: Download HTML
        run: |
          wget -q "${{ github.event.inputs.html_url }}" -O /tmp/index.html
          head -3 /tmp/index.html
      - name: Build APK
        run: |
          unset ANDROID_SDK_ROOT
          export ANDROID_HOME=$HOME/android-sdk
          PKG="${{ github.event.inputs.package_name }}"
          APP="${{ github.event.inputs.app_name }}"
          ICON_URL="${{ github.event.inputs.icon_url }}"
          PKG=$(echo $PKG | tr -d ' ')
          PKG_PATH=$(echo $PKG | tr '.' '/')
          for res in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p /tmp/app/app/src/main/res/$res
          done
          mkdir -p /tmp/app/app/src/main/java/$PKG_PATH
          mkdir -p /tmp/app/app/src/main/assets
          mkdir -p /tmp/app/app/src/main/res/values
          mkdir -p /tmp/app/gradle/wrapper
          cp /tmp/index.html /tmp/app/app/src/main/assets/
          echo "sdk.dir=$HOME/android-sdk" > /tmp/app/local.properties
          if [ -n "$ICON_URL" ]; then
            wget -q "$ICON_URL" -O /tmp/icon.png || true
          fi
          if [ -f "/tmp/icon.png" ] && [ -s "/tmp/icon.png" ]; then
            for res in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
              cp /tmp/icon.png /tmp/app/app/src/main/res/$res/ic_launcher.png
              cp /tmp/icon.png /tmp/app/app/src/main/res/$res/ic_launcher_round.png
            done
            echo "Custom icon applied"
          else
            for res in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
              wget -q "https://placehold.co/192x192/2196F3/ffffff.png" -O /tmp/app/app/src/main/res/$res/ic_launcher.png 2>/dev/null || true
              cp /tmp/app/app/src/main/res/$res/ic_launcher.png /tmp/app/app/src/main/res/$res/ic_launcher_round.png 2>/dev/null || true
            done
            echo "Default icon used"
          fi
          printf 'rootProject.name = "App"\ninclude ":app"\n' > /tmp/app/settings.gradle
          printf 'buildscript {\n    repositories { google(); mavenCentral() }\n    dependencies { classpath "com.android.tools.build:gradle:8.1.0" }\n}\nallprojects { repositories { google(); mavenCentral() } }\n' > /tmp/app/build.gradle
          printf 'distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip\n' > /tmp/app/gradle/wrapper/gradle-wrapper.properties
          printf 'plugins { id "com.android.application" }\nandroid {\n    namespace "%s"\n    compileSdk 34\n    defaultConfig { applicationId "%s"; minSdk 21; targetSdk 34; versionCode 1; versionName "1.0" }\n}\ndependencies {}\n' $PKG $PKG > /tmp/app/app/build.gradle
          printf '<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n<uses-permission android:name="android.permission.INTERNET"/>\n<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n<uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n<uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>\n<uses-permission android:name="android.permission.CAMERA"/>\n<application android:label="%s" android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher_round" android:usesCleartextTraffic="true" android:theme="@android:style/Theme.NoTitleBar">\n<activity android:name=".MainActivity" android:exported="true">\n<intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>\n</activity></application></manifest>\n' "$APP" > /tmp/app/app/src/main/AndroidManifest.xml
          printf 'package %s;\nimport android.app.*;\nimport android.content.*;\nimport android.net.*;\nimport android.os.*;\nimport android.view.*;\nimport android.webkit.*;\npublic class MainActivity extends Activity{\n  private WebView w;\n  private ValueCallback<Uri[]> mFC;\n  private static final int FC_REQ=1;\n  protected void onCreate(Bundle s){\n    super.onCreate(s);\n    getWindow().requestFeature(Window.FEATURE_NO_TITLE);\n    getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,WindowManager.LayoutParams.FLAG_FULLSCREEN);\n    w=new WebView(this);\n    setContentView(w);\n    WebSettings ws=w.getSettings();\n    ws.setJavaScriptEnabled(true);\n    ws.setDomStorageEnabled(true);\n    ws.setDatabaseEnabled(true);\n    ws.setAllowFileAccess(true);\n    ws.setAllowContentAccess(true);\n    ws.setUseWideViewPort(true);\n    ws.setLoadWithOverviewMode(true);\n    ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);\n    ws.setMediaPlaybackRequiresUserGesture(false);\n    ws.setCacheMode(WebSettings.LOAD_DEFAULT);\n    ws.setUserAgentString("Mozilla/5.0 (Linux; Android 10; Mobile) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36");\n    w.setWebViewClient(new WebViewClient(){\n      public boolean shouldOverrideUrlLoading(WebView v,WebResourceRequest r){\n        String u=r.getUrl().toString();\n        if(u.startsWith("http")||u.startsWith("https")){\n          if(u.contains("lawalfataikola123.github.io/Repo2apk2")||u.contains("api.github.com")||u.contains("netlify"))return false;\n          startActivity(new Intent(Intent.ACTION_VIEW,Uri.parse(u)));\n          return true;\n        }\n        return false;\n      }\n      public void onReceivedError(WebView v,WebResourceRequest r,WebResourceError e){\n        if(r.isForMainFrame())v.loadData("<html><body style=background:#030508;color:#fff;font-family:sans-serif;text-align:center;padding:60px><h2 style=color:#60a5fa>Connection Error</h2><p style=color:#94a3b8;margin:16px 0>Check your internet and try again.</p><button onclick=location.reload() style=padding:14px 28px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-size:16px>Retry</button></body></html>","text/html","UTF-8");\n      }\n    });\n    w.setWebChromeClient(new WebChromeClient(){\n      public boolean onShowFileChooser(WebView v,ValueCallback<Uri[]> cb,FileChooserParams p){\n        mFC=cb;\n        Intent i=new Intent(Intent.ACTION_GET_CONTENT);\n        i.addCategory(Intent.CATEGORY_OPENABLE);\n        i.setType("image/*");\n        startActivityForResult(Intent.createChooser(i,"Choose Image"),FC_REQ);\n        return true;\n      }\n      public void onPermissionRequest(PermissionRequest r){r.grant(r.getResources());}\n    });\n    w.setDownloadListener(new DownloadListener(){\n      public void onDownloadStart(String url,String ua,String cd,String mt,long cl){\n        startActivity(new Intent(Intent.ACTION_VIEW,Uri.parse(url)));\n      }\n    });\n    if(s!=null)w.restoreState(s);else w.loadUrl("https://lawalfataikola123.github.io/Repo2apk2");\n  }\n  protected void onActivityResult(int req,int res,Intent data){\n    if(req==FC_REQ){\n      Uri[] results=null;\n      if(res==RESULT_OK&&data!=null)results=new Uri[]{data.getData()};\n      if(mFC!=null){mFC.onReceiveValue(results);mFC=null;}\n    }\n  }\n  public void onBackPressed(){if(w.canGoBack())w.goBack();else super.onBackPressed();}\n  protected void onSaveInstanceState(Bundle o){super.onSaveInstanceState(o);w.saveState(o);}\n  protected void onResume(){super.onResume();w.onResume();}\n  protected void onPause(){super.onPause();w.onPause();}\n  protected void onDestroy(){super.onDestroy();w.destroy();}\n}\n' $PKG > /tmp/app/app/src/main/java/$PKG_PATH/MainActivity.java
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          export PATH="/tmp/gradle-dist/gradle-8.5/bin:$PATH"
          cd /tmp/app && gradle assembleDebug --no-daemon
          find . -name "*.apk" -exec cp {} /tmp/output.apk \;
          echo "Size: $(du -sh /tmp/output.apk | cut -f1)"
      - name: Sign APK
        run: |
          keytool -genkey -v -keystore /tmp/ks.keystore -alias app \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pass1234 -keypass pass1234 \
            -dname "CN=App,O=App,C=NG" 2>/dev/null
          apksigner sign --ks /tmp/ks.keystore --ks-alias app \
            --ks-pass pass:pass1234 --key-pass pass:pass1234 \
            --out /tmp/final.apk /tmp/output.apk 2>/dev/null || cp /tmp/output.apk /tmp/final.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-html-apk
          path: /tmp/final.apk
          retention-days: 7
