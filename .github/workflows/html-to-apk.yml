name: HTML to APK

on:
  workflow_dispatch:
    inputs:
      html_url:
        description: 'URL of HTML file or ZIP (raw GitHub URL)'
        required: true
      app_name:
        description: 'App Name'
        required: true
        default: 'My HTML App'
      package_name:
        description: 'Package Name'
        required: true
        default: 'com.repo2apk.htmlapp'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O /tmp/cmd.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q /tmp/cmd.zip -d /tmp/cmd
          mv /tmp/cmd/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Download HTML
        run: |
          mkdir -p /tmp/htmlfiles
          cd /tmp/htmlfiles
          wget -q "${{ github.event.inputs.html_url }}" -O index.html
          echo "✅ HTML downloaded"
          cat index.html | head -5

      - name: Create HTML App
        run: |
          PKG="${{ github.event.inputs.package_name }}"
          APP="${{ github.event.inputs.app_name }}"
          PKG_PATH=$(echo $PKG | tr '.' '/')

          mkdir -p /tmp/htmlapp/app/src/main/java/$PKG_PATH
          mkdir -p /tmp/htmlapp/app/src/main/assets
          mkdir -p /tmp/htmlapp/app/src/main/res/values
          mkdir -p /tmp/htmlapp/gradle/wrapper

          cp /tmp/htmlfiles/index.html /tmp/htmlapp/app/src/main/assets/

          cat > /tmp/htmlapp/settings.gradle << EOF
          rootProject.name = "HTMLApp"
          include ':app'
          EOF

          cat > /tmp/htmlapp/build.gradle << EOF
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > /tmp/htmlapp/gradle/wrapper/gradle-wrapper.properties << EOF
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          EOF

          cat > /tmp/htmlapp/app/build.gradle << EOF
          plugins { id 'com.android.application' }
          android {
              namespace '$PKG'
              compileSdk 34
              defaultConfig {
                  applicationId '$PKG'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > /tmp/htmlapp/app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="$APP" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > /tmp/htmlapp/app/src/main/java/$PKG_PATH/MainActivity.java << EOF
          package $PKG;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  setContentView(webView);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
              }
          }
          EOF

          cat > /tmp/htmlapp/app/src/main/res/values/styles.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar"/>
          </resources>
          EOF

      - name: Build APK
        run: |
          cd /tmp/htmlapp
          export ANDROID_HOME=$HOME/android-sdk
          gradle assembleDebug --no-daemon
          find . -name "*.apk" -exec cp {} /tmp/html-app.apk \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-html-apk
          path: /tmp/html-app.apk
          retention-days: 7

      - name: Summary
        run: |
          echo "## ✅ HTML to APK Complete!" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 📄 HTML | ${{ github.event.inputs.html_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 App | ${{ github.event.inputs.app_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📏 Size | $(du -sh /tmp/html-app.apk | cut -f1) |" >> $GITHUB_STEP_SUMMARY
