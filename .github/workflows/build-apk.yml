name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'GitHub Repository URL'
        required: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK manually
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O /tmp/cmd.zip
          mkdir -p $HOME/android/cmdline-tools
          unzip -q /tmp/cmd.zip -d /tmp/cmd
          mv /tmp/cmd/cmdline-tools $HOME/android/cmdline-tools/latest
          yes | $HOME/android/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV
          echo "$HOME/android/platform-tools" >> $GITHUB_PATH

      - name: Verify Java version
        run: java -version

      - name: Clone Target Repo
        run: git clone --depth 1 "${{ github.event.inputs.repo_url }}" /tmp/target

      - name: Build APK
        run: |
          cd /tmp/target
          export ANDROID_HOME=$HOME/android
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon
          elif [ -f "android/gradlew" ]; then
            cd android && chmod +x gradlew
            ./gradlew assembleDebug --no-daemon
          fi
          find /tmp/target -name "*.apk" -exec cp {} /tmp/app.apk \; 2>/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: /tmp/app.apk
          retention-days: 7
      - name: Fix Gradle if needed
        run: |
          cd /tmp/target
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            sed -i 's|gradle-7\.[0-9]*\.[0-9]*-bin|gradle-8.0-bin|g' gradle/wrapper/gradle-wrapper.properties
            sed -i 's|gradle-6\.[0-9]*\.[0-9]*-bin|gradle-8.0-bin|g' gradle/wrapper/gradle-wrapper.properties
          fi
