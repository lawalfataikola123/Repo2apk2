name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'GitHub Repository URL to build'
        required: true
        default: 'https://github.com/username/repo'
      build_type:
        description: 'Build Type'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - gradle
          - flutter
          - react-native

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Flutter
        if: ${{ github.event.inputs.build_type == 'flutter' || github.event.inputs.build_type == 'auto' }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone target repository
        run: |
          git clone --depth 1 ${{ github.event.inputs.repo_url }} /tmp/target-repo
          echo "Repository cloned successfully"
          ls /tmp/target-repo

      - name: Detect project type
        id: detect
        run: |
          if [ -f "/tmp/target-repo/pubspec.yaml" ]; then
            echo "type=flutter" >> $GITHUB_OUTPUT
          elif [ -f "/tmp/target-repo/android/app/build.gradle" ] && [ -f "/tmp/target-repo/package.json" ]; then
            echo "type=react-native" >> $GITHUB_OUTPUT
          elif [ -f "/tmp/target-repo/android/app/build.gradle" ] || [ -f "/tmp/target-repo/app/build.gradle" ]; then
            echo "type=gradle" >> $GITHUB_OUTPUT
          else
            echo "type=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Build Flutter APK
        if: steps.detect.outputs.type == 'flutter'
        run: |
          cd /tmp/target-repo
          flutter pub get
          flutter build apk --release
          echo "APK_PATH=/tmp/target-repo/build/app/outputs/flutter-apk/app-release.apk" >> $GITHUB_ENV

      - name: Build Gradle APK
        if: steps.detect.outputs.type == 'gradle'
        run: |
          cd /tmp/target-repo
          if [ -f "android/gradlew" ]; then
            cd android
          fi
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          APK=$(find . -name "*.apk" -path "*/release/*" | head -1)
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Build React Native APK
        if: steps.detect.outputs.type == 'react-native'
        run: |
          cd /tmp/target-repo
          npm install --legacy-peer-deps
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          APK=$(find . -name "*.apk" -path "*/release/*" | head -1)
          echo "APK_PATH=$(pwd)/$APK" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ env.APK_PATH }}
          retention-days: 7

      - name: Build Summary
        run: |
          echo "## Build Complete! ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Repo:** ${{ github.event.inputs.repo_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Type:** ${{ steps.detect.outputs.type }}" >> $GITHUB_STEP_SUMMARY
          echo "**APK:** Download from Artifacts above" >> $GITHUB_STEP_SUMMARY
