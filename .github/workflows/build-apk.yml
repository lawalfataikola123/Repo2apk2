name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'GitHub Repository URL'
        required: true
      notify_email:
        description: 'Email for notification (optional)'
        required: false

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-v1
          restore-keys: gradle-${{ runner.os }}-

      - name: Setup Android SDK
        run: |
          if [ ! -d "$HOME/android-sdk/cmdline-tools/latest" ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O /tmp/cmd.zip
            mkdir -p $HOME/android-sdk/cmdline-tools
            unzip -q /tmp/cmd.zip -d /tmp/cmd
            mv /tmp/cmd/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
            yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
            $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          fi
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Clone Repository
        run: |
          echo "Cloning: ${{ github.event.inputs.repo_url }}"
          git clone --depth 1 "${{ github.event.inputs.repo_url }}" /tmp/target
          ls /tmp/target

      - name: Detect Project Type
        id: detect
        run: |
          cd /tmp/target
          if [ -f "pubspec.yaml" ]; then
            echo "type=flutter" >> $GITHUB_OUTPUT
            echo "Detected: Flutter"
          elif [ -f "package.json" ] && [ -d "android" ]; then
            echo "type=react-native" >> $GITHUB_OUTPUT
            echo "Detected: React Native"
          elif [ -f "android/gradlew" ] || [ -f "gradlew" ]; then
            echo "type=android" >> $GITHUB_OUTPUT
            echo "Detected: Native Android"
          else
            echo "type=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Auto Fix Gradle Version
        run: |
          cd /tmp/target
          find . -name "gradle-wrapper.properties" | while read f; do
            sed -i 's|gradle-[0-9]*\.[0-9]*\.*[0-9]*-bin|gradle-8.5-bin|g' "$f"
            echo "Fixed: $f"
          done
          find . -name "build.gradle" -o -name "build.gradle.kts" | while read f; do
            sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/g' "$f" 2>/dev/null || true
            sed -i 's/targetSdkVersion [12][0-9]/targetSdkVersion 34/g' "$f" 2>/dev/null || true
          done

      - name: Build Flutter APK
        if: steps.detect.outputs.type == 'flutter'
        run: |
          cd /tmp/target
          flutter pub get
          flutter build apk --debug --no-tree-shake-icons
          find . -name "*.apk" -exec cp {} /tmp/app.apk \;

      - name: Build Android APK
        if: steps.detect.outputs.type == 'android'
        run: |
          cd /tmp/target
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          if [ -f "android/gradlew" ]; then
            cd android
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          find /tmp/target -name "*.apk" -exec cp {} /tmp/app.apk \; 2>/dev/null

      - name: Build React Native APK
        if: steps.detect.outputs.type == 'react-native'
        run: |
          cd /tmp/target
          npm install --legacy-peer-deps
          export ANDROID_HOME=$HOME/android-sdk
          cd android && chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          find /tmp/target -name "*.apk" -exec cp {} /tmp/app.apk \; 2>/dev/null

      - name: Sign APK
        run: |
          if [ -f "/tmp/app.apk" ]; then
            keytool -genkey -v \
              -keystore /tmp/release.keystore \
              -alias repo2apk \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass repo2apk123 -keypass repo2apk123 \
              -dname "CN=Repo2APK,O=Repo2APK,C=NG" 2>/dev/null
            apksigner sign \
              --ks /tmp/release.keystore \
              --ks-alias repo2apk \
              --ks-pass pass:repo2apk123 \
              --key-pass pass:repo2apk123 \
              --out /tmp/signed-app.apk \
              /tmp/app.apk 2>/dev/null || cp /tmp/app.apk /tmp/signed-app.apk
            echo "APK signed! Size: $(du -sh /tmp/signed-app.apk | cut -f1)"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: repo2apk-build-${{ github.run_number }}
          path: /tmp/signed-app.apk
          retention-days: 7

      - name: Build Summary
        run: |
          SIZE=$(du -sh /tmp/signed-app.apk 2>/dev/null | cut -f1 || echo "N/A")
          echo "## ✅ Build #${{ github.run_number }} Complete!" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Repo | ${{ github.event.inputs.repo_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Type | ${{ steps.detect.outputs.type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 Size | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| ✍ Signed | Yes |" >> $GITHUB_STEP_SUMMARY

      - name: Send Notification
        if: ${{ github.event.inputs.notify_email != '' }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s "https://ntfy.sh/repo2apk-done" \
            -d "✅ APK Ready! Download: $RUN_URL" \
            -H "Title: Repo2APK Build Done" \
            -H "Tags: android" || true
