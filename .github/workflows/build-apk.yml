name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'GitHub Repository URL'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O /tmp/cmd.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q /tmp/cmd.zip -d /tmp/cmd
          mv /tmp/cmd/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Clone repository
        run: git clone --depth 1 "${{ github.event.inputs.repo_url }}" /tmp/app

      - name: Fix Gradle and AndroidX
        run: |
          cd /tmp/app
          # Create gradle.properties with AndroidX
          if [ -d "android" ]; then
            cd android
          fi
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          # Fix gradle wrapper to use 8.7
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            sed -i 's/gradle-[0-9.]*-bin.zip/gradle-8.7-bin.zip/g' gradle/wrapper/gradle-wrapper.properties
          else
            mkdir -p gradle/wrapper
            echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          fi

      - name: Build debug APK
        run: |
          cd /tmp/app
          if [ -d "android" ]; then cd android; fi
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true || gradle assembleDebug --no-daemon -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: /tmp/app/**/*.apk
