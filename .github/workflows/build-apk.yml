name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'GitHub Repository URL'
        required: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O /tmp/cmd.zip
          mkdir -p $HOME/android/cmdline-tools
          unzip -q /tmp/cmd.zip -d /tmp/cmd
          mv /tmp/cmd/cmdline-tools $HOME/android/cmdline-tools/latest
          yes | $HOME/android/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Clone and Build
        run: |
          git clone --depth 1 ${{ github.event.inputs.repo_url }} /tmp/repo
          cd /tmp/repo
          if [ -f "pubspec.yaml" ]; then
            flutter pub get
            flutter build apk --release --no-tree-shake-icons
            APK=$(find . -name "*.apk" | head -1)
          elif [ -f "android/gradlew" ]; then
            cd android && chmod +x gradlew
            ./gradlew assembleRelease --no-daemon
            APK=$(find . -name "*.apk" -path "*/release/*" | head -1)
          elif [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleRelease --no-daemon
            APK=$(find . -name "*.apk" -path "*/release/*" | head -1)
          fi
          echo "APK_PATH=/tmp/repo/$APK" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ env.APK_PATH }}
          retention-days: 7
