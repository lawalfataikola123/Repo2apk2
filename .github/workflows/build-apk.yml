name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'GitHub Repository URL'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Check Java version
        run: java -version

      - name: Clone repository
        run: git clone --depth 1 "${{ github.event.inputs.repo_url }}" /tmp/app

      - name: 🔧 FORCE GRADLE 8.5 AND ENABLE ANDROIDX (with debug)
        run: |
          cd /tmp/app
          echo "=== BEFORE FIX: gradle-wrapper.properties files ==="
          find . -name "gradle-wrapper.properties" -exec cat {} \;

          # Overwrite every gradle-wrapper.properties with Gradle 8.5
          find . -name "gradle-wrapper.properties" -exec sh -c 'echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip" > {}' \;

          echo "=== AFTER FIX: gradle-wrapper.properties files ==="
          find . -name "gradle-wrapper.properties" -exec cat {} \;

          # Handle gradle.properties for AndroidX
          PROP_FILE=$(find . -name "gradle.properties" -type f | head -1)
          if [ -z "$PROP_FILE" ]; then
            if [ -d "android" ]; then
              PROP_FILE="android/gradle.properties"
            else
              PROP_FILE="gradle.properties"
            fi
            touch "$PROP_FILE"
          fi

          echo "=== BEFORE AndroidX: content of $PROP_FILE ==="
          cat "$PROP_FILE" 2>/dev/null || echo "(file empty or missing)"

          # Add AndroidX properties (avoid duplicates)
          if ! grep -q "^android.useAndroidX=" "$PROP_FILE"; then
            echo "android.useAndroidX=true" >> "$PROP_FILE"
          fi
          if ! grep -q "^android.enableJetifier=" "$PROP_FILE"; then
            echo "android.enableJetifier=true" >> "$PROP_FILE"
          fi

          echo "=== AFTER AndroidX: content of $PROP_FILE ==="
          cat "$PROP_FILE"

      - name: Verify Gradle version
        run: |
          cd /tmp/app
          if [ -d "android" ]; then cd android; fi
          chmod +x gradlew
          ./gradlew --version

      - name: Build debug APK
        run: |
          cd /tmp/app
          if [ -d "android" ]; then cd android; fi
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: /tmp/app/**/*.apk
