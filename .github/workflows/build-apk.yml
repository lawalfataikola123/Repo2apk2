name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'GitHub Repository URL'
        required: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      JAVA_HOME: /usr/lib/jvm/temurin-21-amd64
    steps:
      - name: Install Java 21
        run: |
          wget -q https://packages.adoptium.net/artifactory/deb/pool/main/t/temurin-21/temurin-21-jdk_21.0.5_0+35-1_amd64.deb -O /tmp/jdk21.deb 2>/dev/null || true
          sudo apt-get install -y temurin-21-jdk 2>/dev/null || sudo apt-get install -y openjdk-21-jdk
          java -version
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV

      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O /tmp/cmd.zip
          mkdir -p $HOME/android/cmdline-tools
          unzip -q /tmp/cmd.zip -d /tmp/cmd
          mv /tmp/cmd/cmdline-tools $HOME/android/cmdline-tools/latest
          yes | $HOME/android/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android" >> $GITHUB_ENV

      - name: Clone Repo
        run: |
          git clone --depth 1 "${{ github.event.inputs.repo_url }}" /tmp/target
          ls /tmp/target

      - name: Update Gradle Wrapper
        run: |
          cd /tmp/target
          find . -name "gradle-wrapper.properties" | while read f; do
            sed -i 's|gradle-[0-9]*\.[0-9]*\.*[0-9]*-bin.zip|gradle-8.5-bin.zip|g' "$f"
            echo "Updated: $f"
            cat "$f"
          done

      - name: Build APK
        run: |
          cd /tmp/target
          export ANDROID_HOME=$HOME/android
          export ANDROID_SDK_ROOT=$HOME/android
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon --warning-mode=none 2>&1 | tail -50
          elif [ -f "android/gradlew" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon --warning-mode=none 2>&1 | tail -50
          else
            echo "No gradlew found!"
            exit 1
          fi

      - name: Find and Copy APK
        run: |
          APK=$(find /tmp/target -name "*.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" /tmp/app.apk
          ls -la /tmp/app.apk

      - uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: /tmp/app.apk
          retention-days: 7
