
name: GitHub to Live URL

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Linux Commands (Like Termux)
        run: |
          # NOTE: GitHub Actions uses 'apt-get' instead of 'pkg'
          # If you need to install tools (like python or wget):
          # apt-get update -y
          # apt-get install -y python3
          
          echo "Preparing files..."
          
          # Create a folder for the website
          mkdir -p public
          
          # Copy all your files into the public folder
          cp -r * public/
          
          # Clean up (remove the workflow folder from the website)
          rm -rf public/.github
          
          echo "Done. Files are ready for Live URL."

      - name: Upload & Deploy
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'
          
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
