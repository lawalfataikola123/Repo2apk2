name: URL to APK
on:
  workflow_dispatch:
    inputs:
      website_url:
        description: 'Website URL to convert'
        required: true
      app_name:
        description: 'App Name'
        required: true
        default: 'My App'
      package_name:
        description: 'Package Name'
        required: true
        default: 'com.repo2apk.app'
      app_color:
        description: 'Theme Color hex without #'
        required: false
        default: '2196F3'
      icon_url:
        description: 'Custom app icon URL'
        required: false
        default: ''
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O /tmp/cmd.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q /tmp/cmd.zip -d /tmp/cmd
          mv /tmp/cmd/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH
      - name: Build APK
        run: |
          unset ANDROID_SDK_ROOT
          export ANDROID_HOME=$HOME/android-sdk
          PKG="${{ github.event.inputs.package_name }}"
          APP="${{ github.event.inputs.app_name }}"
          URL="${{ github.event.inputs.website_url }}"
          COLOR="${{ github.event.inputs.app_color }}"
          PKG_PATH=$(echo $PKG | tr '.' '/')
          mkdir -p /tmp/app/app/src/main/java/$PKG_PATH
          mkdir -p /tmp/app/app/src/main/res/values
          mkdir -p /tmp/app/gradle/wrapper
          echo "sdk.dir=$HOME/android-sdk" > /tmp/app/local.properties
          printf 'rootProject.name = "App"\ninclude ":app"\n' > /tmp/app/settings.gradle
          printf 'buildscript {\n    repositories { google(); mavenCentral() }\n    dependencies { classpath "com.android.tools.build:gradle:8.1.0" }\n}\nallprojects { repositories { google(); mavenCentral() } }\n' > /tmp/app/build.gradle
          printf 'distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip\n' > /tmp/app/gradle/wrapper/gradle-wrapper.properties
          printf 'plugins { id "com.android.application" }\nandroid {\n    namespace "%s"\n    compileSdk 34\n    defaultConfig { applicationId "%s"; minSdk 21; targetSdk 34; versionCode 1; versionName "1.0" }\n}\ndependencies {}\n' $PKG $PKG > /tmp/app/app/build.gradle
          printf '<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n<uses-permission android:name="android.permission.INTERNET"/>\n<application android:label="%s" android:usesCleartextTraffic="true" android:theme="@android:style/Theme.NoTitleBar">\n<activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize">\n<intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>\n</activity></application></manifest>\n' "$APP" > /tmp/app/app/src/main/AndroidManifest.xml
          printf 'package %s;\nimport android.app.*;\nimport android.os.*;\nimport android.webkit.*;\npublic class MainActivity extends Activity {\n    private WebView w;\n    protected void onCreate(Bundle s) {\n        super.onCreate(s);\n        w = new WebView(this); setContentView(w);\n        w.getSettings().setJavaScriptEnabled(true);\n        w.getSettings().setDomStorageEnabled(true);\n        w.getSettings().setLoadWithOverviewMode(true);\n        w.getSettings().setUseWideViewPort(true);\n        w.setWebViewClient(new WebViewClient());\n        w.setWebChromeClient(new WebChromeClient());\n        w.loadUrl("%s");\n    }\n    public void onBackPressed() {\n        if (w.canGoBack()) w.goBack(); else super.onBackPressed();\n    }\n}\n' $PKG "$URL" > /tmp/app/app/src/main/java/$PKG_PATH/MainActivity.java
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources><style name="AppTheme" parent="@android:style/Theme.NoTitleBar"><item name="android:colorPrimary">#%s</item></style></resources>\n' "$COLOR" > /tmp/app/app/src/main/res/values/styles.xml
          if [ -n "${{ github.event.inputs.icon_url }}" ]; then
            wget -q "${{ github.event.inputs.icon_url }}" -O /tmp/custom-icon.png 2>/dev/null || true
            mkdir -p /tmp/app/app/src/main/res/mipmap-xxxhdpi
            cp /tmp/custom-icon.png /tmp/app/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png 2>/dev/null || true
            cp /tmp/custom-icon.png /tmp/app/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png 2>/dev/null || true
            echo "Icon applied!"
          fi
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          export PATH="/tmp/gradle-dist/gradle-8.5/bin:$PATH"
          cd /tmp/app && gradle assembleDebug --no-daemon
          find . -name "*.apk" -exec cp {} /tmp/output.apk \;
          echo "Size: $(du -sh /tmp/output.apk | cut -f1)"
      - name: Sign APK
        run: |
          keytool -genkey -v -keystore /tmp/ks.keystore -alias app \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pass1234 -keypass pass1234 \
            -dname "CN=App,O=App,C=NG" 2>/dev/null
          apksigner sign --ks /tmp/ks.keystore --ks-alias app \
            --ks-pass pass:pass1234 --key-pass pass:pass1234 \
            --out /tmp/final.apk /tmp/output.apk 2>/dev/null || cp /tmp/output.apk /tmp/final.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-url-apk
          path: /tmp/final.apk
          retention-days: 7
      - name: Summary
        run: |
          echo "## URL to APK Complete!" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ github.event.inputs.website_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| App | ${{ github.event.inputs.app_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $(du -sh /tmp/final.apk 2>/dev/null | cut -f1) |" >> $GITHUB_STEP_SUMMARY
