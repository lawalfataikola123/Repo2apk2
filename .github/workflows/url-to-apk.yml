name: URL to APK
on:
  workflow_dispatch:
    inputs:
      website_url:
        description: 'Website URL to convert'
        required: true
      app_name:
        description: 'App Name'
        required: true
        default: 'My App'
      package_name:
        description: 'Package Name'
        required: true
        default: 'com.repo2apk.app'
      app_color:
        description: 'Theme Color hex without #'
        required: false
        default: '2196F3'
      icon_url:
        description: 'Custom app icon URL'
        required: false
        default: ''
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O /tmp/cmd.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q /tmp/cmd.zip -d /tmp/cmd
          mv /tmp/cmd/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH
      - name: Build APK
        run: |
          unset ANDROID_SDK_ROOT
          export ANDROID_HOME=$HOME/android-sdk
          PKG="${{ github.event.inputs.package_name }}"
          APP="${{ github.event.inputs.app_name }}"
          URL="${{ github.event.inputs.website_url }}"
          COLOR="${{ github.event.inputs.app_color }}"
          ICON_URL="${{ github.event.inputs.icon_url }}"
          PKG_PATH=$(echo $PKG | tr '.' '/')
          for res in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p /tmp/app/app/src/main/res/$res
          done
          mkdir -p /tmp/app/app/src/main/java/$PKG_PATH
          mkdir -p /tmp/app/app/src/main/res/values
          mkdir -p /tmp/app/gradle/wrapper
          echo "sdk.dir=$HOME/android-sdk" > /tmp/app/local.properties
          if [ -n "$ICON_URL" ]; then
            wget -q "$ICON_URL" -O /tmp/icon.png || true
          fi
          if [ -f "/tmp/icon.png" ] && [ -s "/tmp/icon.png" ]; then
            for res in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
              cp /tmp/icon.png /tmp/app/app/src/main/res/$res/ic_launcher.png
              cp /tmp/icon.png /tmp/app/app/src/main/res/$res/ic_launcher_round.png
            done
            echo "Custom icon applied"
          else
            for res in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
              wget -q "https://placehold.co/192x192/${COLOR:-2196F3}/ffffff.png" -O /tmp/app/app/src/main/res/$res/ic_launcher.png 2>/dev/null || true
              cp /tmp/app/app/src/main/res/$res/ic_launcher.png /tmp/app/app/src/main/res/$res/ic_launcher_round.png 2>/dev/null || true
            done
            echo "Default icon created"
          fi
          printf 'rootProject.name = "App"\ninclude ":app"\n' > /tmp/app/settings.gradle
          printf 'buildscript {\n    repositories { google(); mavenCentral() }\n    dependencies { classpath "com.android.tools.build:gradle:8.1.0" }\n}\nallprojects { repositories { google(); mavenCentral() } }\n' > /tmp/app/build.gradle
          printf 'distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip\n' > /tmp/app/gradle/wrapper/gradle-wrapper.properties
          printf 'plugins { id "com.android.application" }\nandroid {\n    namespace "%s"\n    compileSdk 34\n    defaultConfig { applicationId "%s"; minSdk 21; targetSdk 34; versionCode 1; versionName "1.0" }\n}\ndependencies {}\n' $PKG $PKG > /tmp/app/app/build.gradle
          printf '<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n<uses-permission android:name="android.permission.INTERNET"/>\n<application android:label="%s" android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher_round" android:usesCleartextTraffic="true" android:theme="@android:style/Theme.NoTitleBar">\n<activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize">\n<intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>\n</activity></application></manifest>\n' "$APP" > /tmp/app/app/src/main/AndroidManifest.xml
          python3 -c "
import os,sys
pkg=os.environ['PKG']
url=os.environ['URL']
pp=pkg.replace('.','/')
j='''package '''+pkg+''';
import android.app.*;import android.content.*;import android.net.*;
import android.os.*;import android.view.*;import android.webkit.*;
public class MainActivity extends Activity {
  private WebView w;
  private String U='''+chr(34)+url+chr(34)+''';
  protected void onCreate(Bundle s){
    super.onCreate(s);
    getWindow().requestFeature(Window.FEATURE_NO_TITLE);
    getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,WindowManager.LayoutParams.FLAG_FULLSCREEN);
    w=new WebView(this);setContentView(w);
    WebSettings ws=w.getSettings();
    ws.setJavaScriptEnabled(true);ws.setDomStorageEnabled(true);ws.setDatabaseEnabled(true);
    ws.setUseWideViewPort(true);ws.setLoadWithOverviewMode(true);
    ws.setLayoutAlgorithm(WebSettings.LayoutAlgorithm.TEXT_AUTOSIZING);
    ws.setMediaPlaybackRequiresUserGesture(false);
    ws.setAllowFileAccess(true);ws.setAllowContentAccess(true);
    ws.setSupportZoom(true);ws.setBuiltInZoomControls(true);ws.setDisplayZoomControls(false);
    ws.setCacheMode(WebSettings.LOAD_DEFAULT);
    ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
    ws.setUserAgentString("Mozilla/5.0 (Linux; Android 10; Mobile) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36");
    w.setWebViewClient(new WebViewClient(){
      public boolean shouldOverrideUrlLoading(WebView v,WebResourceRequest r){
        String u=r.getUrl().toString();
        try{if(u.contains(Uri.parse(U).getHost()))return false;}catch(Exception e){}
        if(u.startsWith("http")){startActivity(new Intent(Intent.ACTION_VIEW,Uri.parse(u)));return true;}
        return false;
      }
      public void onReceivedError(WebView v,WebResourceRequest r,WebResourceError e){
        if(r.isForMainFrame())v.loadData("<html><body style=background:#111;color:#fff;font-family:sans-serif;text-align:center;padding:60px><h2>No Connection</h2><p>Check internet and retry.</p><button onclick=location.reload() style=padding:14px 28px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-size:16px>Retry</button></body></html>","text/html","UTF-8");
      }
    });
    w.setWebChromeClient(new WebChromeClient(){
      public void onPermissionRequest(PermissionRequest r){r.grant(r.getResources());}
    });
    if(s!=null)w.restoreState(s);else w.loadUrl(U);
  }
  public void onBackPressed(){if(w.canGoBack())w.goBack();else super.onBackPressed();}
  protected void onSaveInstanceState(Bundle o){super.onSaveInstanceState(o);w.saveState(o);}
  protected void onResume(){super.onResume();w.onResume();}
  protected void onPause(){super.onPause();w.onPause();}
  protected void onDestroy(){super.onDestroy();w.destroy();}
}''';
open('/tmp/app/app/src/main/java/'+pp+'/MainActivity.java','w').write(j);
print('Java written')
" 
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources><style name="AppTheme" parent="@android:style/Theme.NoTitleBar"><item name="android:colorPrimary">#%s</item></style></resources>\n' "$COLOR" > /tmp/app/app/src/main/res/values/styles.xml
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          export PATH="/tmp/gradle-dist/gradle-8.5/bin:$PATH"
          cd /tmp/app && gradle assembleDebug --no-daemon
          find . -name "*.apk" -exec cp {} /tmp/output.apk \;
      - name: Sign APK
        run: |
          keytool -genkey -v -keystore /tmp/ks.keystore -alias app \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pass1234 -keypass pass1234 \
            -dname "CN=App,O=App,C=NG" 2>/dev/null
          apksigner sign --ks /tmp/ks.keystore --ks-alias app \
            --ks-pass pass:pass1234 --key-pass pass:pass1234 \
            --out /tmp/final.apk /tmp/output.apk 2>/dev/null || cp /tmp/output.apk /tmp/final.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-url-apk
          path: /tmp/final.apk
          retention-days: 7
