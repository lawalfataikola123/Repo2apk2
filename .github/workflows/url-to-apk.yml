name: URL to APK

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: 'Website URL to convert (e.g. https://google.com)'
        required: true
      app_name:
        description: 'App Name'
        required: true
        default: 'My App'
      package_name:
        description: 'Package Name (e.g. com.myapp.website)'
        required: true
        default: 'com.repo2apk.app'
      app_color:
        description: 'App Theme Color (hex without #)'
        required: false
        default: '2196F3'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-url2apk-v1

      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O /tmp/cmd.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q /tmp/cmd.zip -d /tmp/cmd
          mv /tmp/cmd/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Create WebView App
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          PKG="${{ github.event.inputs.package_name }}"
          URL="${{ github.event.inputs.website_url }}"
          COLOR="${{ github.event.inputs.app_color }}"
          PKG_PATH=$(echo $PKG | tr '.' '/')

          mkdir -p /tmp/webviewapp
          cd /tmp/webviewapp

          # settings.gradle
          cat > settings.gradle << EOF
          rootProject.name = "WebViewApp"
          include ':app'
          EOF

          # root build.gradle
          cat > build.gradle << EOF
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # gradle wrapper
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << EOF
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          EOF

          # gradlew
          cat > gradlew << 'GRADLEW'
          #!/bin/sh
          exec gradle "$@"
          GRADLEW
          chmod +x gradlew

          # app/build.gradle
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          cat > app/build.gradle << EOF
          plugins { id 'com.android.application' }
          android {
              namespace '$PKG'
              compileSdk 34
              defaultConfig {
                  applicationId '$PKG'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  release { minifyEnabled false }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.8.0'
          }
          EOF

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:allowBackup="true"
                  android:label="$APP_NAME"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # MainActivity.java
          cat > app/src/main/java/$PKG_PATH/MainActivity.java << EOF
          package $PKG;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebChromeClient;
          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.loadUrl("$URL");
              }
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

          # colors.xml
          cat > app/src/main/res/values/colors.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="primary">#$COLOR</color>
          </resources>
          EOF

          # styles.xml
          cat > app/src/main/res/values/styles.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/primary</item>
              </style>
          </resources>
          EOF

          echo "✅ WebView app created for: $URL"

      - name: Build APK
        run: |
          cd /tmp/webviewapp
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          gradle assembleDebug --no-daemon
          find . -name "*.apk" -exec cp {} /tmp/webview-app.apk \;
          echo "✅ APK built! Size: $(du -sh /tmp/webview-app.apk | cut -f1)"

      - name: Sign APK
        run: |
          keytool -genkey -v \
            -keystore /tmp/ks.keystore -alias app \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pass1234 -keypass pass1234 \
            -dname "CN=Repo2APK,O=Repo2APK,C=NG" 2>/dev/null
          $HOME/android-sdk/build-tools/34.0.0/apksigner sign \
            --ks /tmp/ks.keystore --ks-alias app \
            --ks-pass pass:pass1234 --key-pass pass:pass1234 \
            --out /tmp/final.apk /tmp/webview-app.apk 2>/dev/null || \
            cp /tmp/webview-app.apk /tmp/final.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-webview-apk
          path: /tmp/final.apk
          retention-days: 7

      - name: Summary
        run: |
          echo "## ✅ URL to APK Complete!" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 URL | ${{ github.event.inputs.website_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 App | ${{ github.event.inputs.app_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Package | ${{ github.event.inputs.package_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📏 Size | $(du -sh /tmp/final.apk | cut -f1) |" >> $GITHUB_STEP_SUMMARY
