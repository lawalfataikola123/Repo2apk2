version: '3.9'

# ════════════════════════════════════════════════════════════════════
# Development override - use with:
# docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# ════════════════════════════════════════════════════════════════════

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    volumes:
      # Hot reload server code (mount over container)
      - ./server:/app/server
      - /app/server/node_modules
      # Persist builds between restarts
      - builds_data:/app/builds
    command: ["node", "--watch", "index.js"]
    ports:
      - "5000:5000"

  nginx:
    # In dev, skip nginx and connect directly to app
    profiles:
      - production
